<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HATE LIST - Martín Aguilar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(8, 8, 10, 0.88);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #ff4757;
            --gold: #ffd700;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
        }

        @keyframes pageIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }
        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideRight {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #000;
            background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                              url('img/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: pageIn 1s ease-out;
        }

        .scroll-list::-webkit-scrollbar { width: 6px; }
        .scroll-list::-webkit-scrollbar-track { background: transparent; }
        .scroll-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .scroll-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        header {
            padding: 2.5rem;
            text-align: center;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
            animation: slideDown 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .rainbow-title {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-wave 3s linear infinite;
        }

        .subtitle {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            font-size: 1.4rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        @keyframes rainbow-wave { to { background-position: 200% center; } }

        main { display: flex; flex: 1; overflow: hidden; }

        .list-panel {
            width: 450px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            animation: slideRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s backwards;
        }

        .search-box { padding: 1.5rem; }
        .search-box input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .scroll-list { flex: 1; overflow-y: auto; padding: 10px 20px; }

        .list-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .list-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .list-item.active { background: var(--accent); box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4); }
        .list-item.active .rank-num, .list-item.active .item-name { color: #fff !important; }

        .rank-num { font-weight: 900; font-size: 1.2rem; min-width: 65px; color: rgba(255,255,255,0.3); }
        .list-item[data-rank="1"] .rank-num { color: var(--gold); }
        .list-item[data-rank="2"] .rank-num { color: var(--silver); }
        .list-item[data-rank="3"] .rank-num { color: var(--bronze); }
        .item-name { font-weight: 700; }
        
        .detail-panel {
            flex: 1;
            padding: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pageIn 1s ease-out 0.4s backwards;
        }

        .info-card {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            max-width: 850px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .card-header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 20px;
            gap: 20px;
        }

        .card-rank { font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .card-title { font-size: 2.8rem; font-weight: 900; line-height: 1.1; }

        .card-content { display: flex; gap: 40px; margin-top: 10px; }

        .img-placeholder {
            width: 320px;
            height: 320px;
            background: #000;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .text-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 900; margin-bottom: 8px; }
        .desc-box, .reason-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            line-height: 1.6;
        }

        .action-btn {
            padding: 16px 32px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            border-radius: 14px;
            transition: 0.3s;
            text-align: center;
            text-transform: uppercase;
            align-self: flex-start;
        }
        .action-btn:hover { background: var(--accent); color: #fff; transform: translateY(-3px); }

        @media (max-width: 1000px) {
            main { flex-direction: column; }
            .list-panel { width: 100%; height: 40%; }
            .card-content { flex-direction: column; }
            .img-placeholder { width: 100%; height: 220px; }
            .rainbow-title { font-size: 2.8rem; }
        }
    </style>
</head>

        const listContainer = document.getElementById('listContainer');
        const searchInput = document.getElementById('search');

        function render(filter = "") {
            listContainer.innerHTML = "";
            hateItems.forEach((name, i) => {
                const rank = i + 1;
                if (filter && !name.toLowerCase().includes(filter.toLowerCase()) && !rank.toString().includes(filter)) return;

                const div = document.createElement('div');
                div.className = 'list-item';
                div.setAttribute('data-rank', rank);
                div.innerHTML = `<span class="rank-num">#${rank}</span><span class="item-name">${name}</span>`;
                div.onclick = () => selectItem(rank, name, div);
                listContainer.appendChild(div);
                if (rank === 1 && !filter) div.classList.add('active');
            });
        }

        function selectItem(rank, name, element) {
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const data = customContent[rank] || {};
            document.getElementById('d-rank').textContent = `#${rank}`;
            document.getElementById('d-title').textContent = name;
            document.getElementById('d-reason').textContent = data.reason || "Martin no ha dado una razón pública para odiar esto todavía.";
            document.getElementById('d-desc').textContent = data.desc || "No hay una descripción detallada registrada en la base de datos de odio.";
            
            const imgEl = document.getElementById('d-img');
            const noImg = document.getElementById('no-img');
            
            if(data.img) {
                imgEl.src = data.img;
                imgEl.style.display = 'block';
                noImg.style.display = 'none';
                
                // Falta imagen
                imgEl.onerror = () => {
                    imgEl.style.display = 'none';
                    noImg.style.display = 'flex';
                    noImg.textContent = "IMG NO ENCONTRADA";
                };
            } else {
                imgEl.style.display = 'none';
                noImg.style.display = 'flex';
                noImg.textContent = "SIN IMAGEN";
            }

            const linkEl = document.getElementById('d-link');
            if(data.link) {
                linkEl.href = data.link;
                linkEl.style.display = 'inline-block';
            } else {
                linkEl.style.display = 'none';
            }

            document.getElementById('card').animate([
                { opacity: 0, transform: 'scale(0.98) translateY(5px)' },
                { opacity: 1, transform: 'scale(1) translateY(0)' }
            ], { duration: 250, easing: 'ease-out' });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();
        selectItem(1, hateItems[0], document.querySelector('.list-item'));
    </script>
